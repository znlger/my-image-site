<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>示例图集 01 - 我的图集站</title>
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    .post{padding:36px 0}
    .post h1{font-size:34px;margin:0 0 10px}
    .post-meta{color:#666;margin-bottom:24px}
    .gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .gallery img{width:100%;border-radius:18px;display:block;background:#eee}
    .back{display:inline-block;margin:18px 0;color:#666}
    @media(max-width:700px){.gallery{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/">我的图集站</a>
      <nav><a href="/">首页</a></nav>
    </div>
  </header>
  <main class="container post">
    <a class="back" href="/">← 返回首页</a>
    <h1>示例图集 01</h1>
    <div class="post-meta">分类：写真 · 日期：2026-05-13</div>
    <div class="gallery">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1200&auto=format&fit=crop" alt="">
      <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=1200&auto=format&fit=crop" alt="">
      <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=1200&auto=format&fit=crop" alt="">
      <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=1200&auto=format&fit=crop" alt="">
    </div>
  </main>
</body>
</html>
