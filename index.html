<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>星图画廊</title>
  <meta name="description" content="高级瀑布流图片图集展示站" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div class="ambient"></div>

  <header class="site-top">
    <a class="brand" href="/">
      <span class="brand-mark">S</span>
      <span>
        <strong>星图画廊</strong>
        <em>Visual Gallery</em>
      </span>
    </a>

    <nav class="top-nav">
      <a href="/" class="active">首页</a>
      <a href="#categories">分类</a>
      <a href="#archive">归档</a>
      <a href="#about">关于</a>
    </nav>

    <button id="searchToggle" class="round-btn" aria-label="搜索">⌕</button>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <span class="eyebrow">Curated Visual Collection</span>
        <h1>更漂亮的<br>瀑布流图集展示</h1>
        <p>以图片为主角，适合活动图、生图、写真、街拍、作品集预览。</p>
      </div>

      <div class="hero-card">
        <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=1000&auto=format&fit=crop" alt="">
        <div class="hero-card-info">
          <span>精选图集</span>
          <strong>红毯活动生图预览</strong>
        </div>
      </div>
    </section>

    <section id="searchPanel" class="search-panel">
      <input id="searchInput" placeholder="搜索标题、分类或标签..." />
    </section>

    <section class="control-row">
      <div class="stats">
        <div><strong id="postCount">0</strong><span>图集</span></div>
        <div><strong id="categoryCount">0</strong><span>分类</span></div>
        <div><strong id="tagCount">0</strong><span>标签</span></div>
      </div>

      <div id="categories" class="category-bar">
        <button class="category-pill active" data-category="全部">全部</button>
      </div>
    </section>

    <section id="postGrid" class="waterfall"></section>

    <section id="about" class="about">
      <h2>关于本站</h2>
      <p>这是一个低成本静态图集站。你可以把图片放到 Cloudflare R2，再把图片链接填入网站数据里。</p>
    </section>
  </main>

  <footer class="footer">© <span id="year"></span> 星图画廊</footer>

  <script src="/assets/app.js"></script>
</body>
</html>
