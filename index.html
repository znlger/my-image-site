<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>女明星生图</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <header class="site-top">
    <a class="brand" href="./index.html" id="homeLogo">
      <span class="brand-mark">女</span>
      <span><strong id="brandName">女明星生图</strong><em>Live Photo Gallery</em></span>
    </a>
    <nav class="top-nav">
      <a href="./index.html" id="homeNav" class="active">首页</a>
      <a href="#categories">分类</a>
      <a href="#about" id="aboutNav">关于</a>
    </nav>
    <button id="themeToggle" class="icon-btn" aria-label="切换明暗主题" title="切换明暗主题">
      <span id="themeIcon">☀</span>
    </button>
    <button id="searchToggle" class="search-btn" aria-label="搜索">⌕</button>
  </header>

  <main id="homePage">
    <section class="hero">
      <div>
        <span class="eyebrow">精选生图 · 高清预览</span>
        <h1><span id="title1">精选女明星生图</span><span id="title2">高清原图预览</span></h1>
        <p id="siteDesc"></p>
      </div>
      <div class="feature-stack-stage">
        <div class="stack-glow"></div>
        <div class="stack-platform"></div>
        <div id="coverStack" class="cover-stack"></div>
      </div>
    </section>

    <section id="searchPanel" class="search-panel">
      <input id="searchInput" placeholder="搜索标题、分类或标签..." />
    </section>

    <section id="categories" class="cats">
      <button class="active" data-category="全部">全部</button>
    </section>

    <section id="postGrid" class="waterfall"></section>
  </main>

  <main id="aboutPage" class="about-page hidden">
    <section class="about about-standalone">
      <div class="about-title-row">
        <h2>关于</h2>
        <button id="backHomeBtn" class="btn btn-soft" type="button">返回首页</button>
      </div>
      <p id="aboutText"></p>
    </section>
  </main>

  <footer class="footer">© <span id="year"></span> <span id="footerName">女明星生图</span></footer>
  <script src="./assets/app.js"></script>
</body>
</html>
